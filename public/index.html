<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Ecommerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Mini Ecommerce</h1>
    </header>
    <section id="controls">
        <input type="text" id="search" placeholder="Buscar produto...">      
        <select id="category">
            <option value="Todas">Todas as Categorias</option>
        </select>
        <button id="btnRender">Renderizar Catálogo</button>
    </section>
    <main>
        <div id="product-list"></div>
        <div id="product-details">
            <p>Clique em "Ver detalhes" para exibir informações aqui.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
