<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Ecommerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mini Ecommerce</h1>
    </header>

    <main>
        <section class="controls">
            <input type="text" id="search" placeholder="Buscar produto...">
            
            <select id="category">
                <option value="Todas">Todas</option>
            </select>

            <button id="btnRender">Renderizar</button>
        </section>

        <section class="container">
            <div id="product-list">
                <!-- Cards serão renderizados aqui -->
            </div>

            <div id="product-details">
                <p>Clique em "Ver detalhes" para ver mais informações.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
